<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>쇼핑 리스트</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
    }

    .container {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.1);
      width: 100%;
      max-width: 480px;
      padding: 32px;
      height: fit-content;
    }

    h1 {
      font-size: 1.6rem;
      color: #1a202c;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 0.85rem;
      color: #718096;
      margin-bottom: 24px;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .input-row input {
      flex: 1;
      padding: 10px 14px;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-row input:focus-visible {
      border-color: #667eea;
    }

    .input-row button {
      padding: 10px 18px;
      background: #667eea;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 0.95rem;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .input-row button:hover {
      background: #5a67d8;
    }

    .stats {
      display: flex;
      justify-content: space-between;
      font-size: 0.8rem;
      color: #718096;
      margin-bottom: 12px;
    }

    .clear-btn {
      background: none;
      border: none;
      color: #e53e3e;
      font-size: 0.8rem;
      cursor: pointer;
      padding: 0;
    }

    .clear-btn:hover {
      text-decoration: underline;
    }

    ul {
      list-style: none;
    }

    li {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      border-radius: 10px;
      transition: background 0.15s;
    }

    li:hover {
      background: #f7fafc;
    }

    li.checked {
      opacity: 0.5;
    }

    li input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: #667eea;
      cursor: pointer;
      flex-shrink: 0;
    }

    .item-text {
      flex: 1;
      font-size: 0.95rem;
      color: #2d3748;
      cursor: pointer;
      user-select: none;
    }

    li.checked .item-text {
      text-decoration: line-through;
      color: #a0aec0;
    }

    .delete-btn {
      background: none;
      border: none;
      color: #cbd5e0;
      font-size: 1.1rem;
      cursor: pointer;
      line-height: 1;
      padding: 2px 6px;
      border-radius: 6px;
      transition: color 0.2s, background 0.2s;
    }

    .delete-btn:hover {
      color: #e53e3e;
      background: #fff5f5;
    }

    .empty {
      text-align: center;
      color: #a0aec0;
      font-size: 0.9rem;
      padding: 32px 0;
    }

    .divider {
      border: none;
      border-top: 1px solid #e2e8f0;
      margin-bottom: 16px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>장바구니</h1>
    <p class="subtitle">오늘 사야 할 것들을 추가해 보세요</p>

    <div class="input-row">
      <input type="text" id="itemInput" placeholder="아이템 입력..." />
      <button type="button" id="addBtn">추가</button>
    </div>

    <div class="stats">
      <span id="statsText">총 0개</span>
      <button type="button" class="clear-btn" id="clearBtn">완료 항목 삭제</button>
    </div>
    <hr class="divider" />

    <ul id="list"></ul>
    <p class="empty" id="empty">아직 아이템이 없습니다</p>
  </div>

  <script>
    const STORAGE_KEY = 'shopping_list';

    let items = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');

    const listEl = document.getElementById('list');
    const emptyEl = document.getElementById('empty');
    const statsEl = document.getElementById('statsText');
    const inputEl = document.getElementById('itemInput');

    document.getElementById('addBtn').addEventListener('click', addItem);
    document.getElementById('clearBtn').addEventListener('click', clearChecked);

    inputEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') addItem();
    });

    function save() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
    }

    function render() {
      listEl.replaceChildren();

      if (items.length === 0) {
        emptyEl.style.display = 'block';
        statsEl.textContent = '총 0개';
        return;
      }

      emptyEl.style.display = 'none';
      const checked = items.filter(i => i.done).length;
      statsEl.textContent = `총 ${items.length}개 · 완료 ${checked}개`;

      items.forEach((item, index) => {
        const li = document.createElement('li');
        if (item.done) li.classList.add('checked');

        const checkbox = document.createElement('input');
        checkbox.type = 'checkbox';
        checkbox.checked = item.done;
        checkbox.addEventListener('change', () => toggle(index));

        const span = document.createElement('span');
        span.className = 'item-text';
        span.textContent = item.text;
        span.addEventListener('click', () => toggle(index));

        const delBtn = document.createElement('button');
        delBtn.className = 'delete-btn';
        delBtn.textContent = '✕';
        delBtn.title = '삭제';
        delBtn.addEventListener('click', () => remove(index));

        li.appendChild(checkbox);
        li.appendChild(span);
        li.appendChild(delBtn);
        listEl.appendChild(li);
      });
    }

    function addItem() {
      const text = inputEl.value.trim();
      if (!text) return;
      items.push({ text, done: false });
      inputEl.value = '';
      save();
      render();
    }

    function toggle(index) {
      items[index].done = !items[index].done;
      save();
      render();
    }

    function remove(index) {
      items.splice(index, 1);
      save();
      render();
    }

    function clearChecked() {
      items = items.filter(i => !i.done);
      save();
      render();
    }

    render();
  </script>
</body>
</html>
